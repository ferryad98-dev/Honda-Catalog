<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HAMBRA MOTOR HONDA - Official Mobile Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfdfd; -webkit-tap-highlight-color: transparent; }
        .honda-red { color: #ed1c24; }
        .bg-honda-red { background-color: #ed1c24; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .product-card:active { transform: scale(0.95); }
    </style>
</head>
<body class="pb-32">

    <header class="bg-white px-5 py-4 sticky top-0 z-50 shadow-sm border-b border-slate-50">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="logo.jpg" alt="Logo" class="w-10 h-10 object-contain rounded-lg">
                <div>
                    <h1 class="text-xl font-extrabold italic tracking-tighter honda-red leading-none uppercase">HAMBRA MOTOR</h1>
                    <p class="text-[8px] font-bold text-slate-400 tracking-widest uppercase mt-0.5">Authorized Honda Dealer</p>
                </div>
            </div>
            <button onclick="toggleSearch()" class="w-10 h-10 bg-slate-50 flex items-center justify-center rounded-2xl active:scale-90 transition">
                <svg class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2.5" stroke-linecap="round"></path>
                </svg>
            </button>
        </div>
        <div id="search-container" class="max-h-0 opacity-0 overflow-hidden transition-all duration-300 px-1">
            <input type="text" id="search-input" onkeyup="searchProduct()" placeholder="Cari model motor..." 
                class="w-full bg-slate-50 border border-slate-100 rounded-2xl py-4 px-6 text-sm mt-4 outline-none focus:ring-2 focus:ring-red-500">
        </div>
    </header>

    <div class="p-4" id="banner-section">
        <div class="w-full h-48 bg-gradient-to-br from-red-700 via-red-600 to-red-900 rounded-[2.5rem] mb-4 overflow-hidden relative shadow-xl shadow-red-100">
            <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-10"></div>
            <div class="absolute inset-0 flex flex-col justify-end p-8 text-white">
                <span class="text-[9px] font-bold bg-black/20 backdrop-blur-md w-fit px-3 py-1 rounded-full mb-3 uppercase tracking-wider">Official Store</span>
                <h2 class="text-2xl font-bold leading-tight tracking-tight">Selamat Datang di <br>Hambra Motor</h2>
                <p class="text-xs text-red-100 mt-2 opacity-80">Solusi motor Honda terbaik untuk Anda.</p>
            </div>
        </div>
    </div>

    <div id="category-section" class="sticky top-[82px] bg-white z-40 mb-6 py-4 border-b border-slate-50">
        <div class="flex overflow-x-auto no-scrollbar px-4 gap-3 whitespace-nowrap">
            <button onclick="filterCategory('semua', this)" class="cat-btn px-7 py-2.5 bg-honda-red text-white rounded-xl text-[11px] font-bold uppercase transition-all shadow-lg shadow-red-100">Semua</button>
            <button onclick="filterCategory('matic', this)" class="cat-btn px-7 py-2.5 bg-white text-slate-400 border border-slate-100 rounded-xl text-[11px] font-bold uppercase transition-all">Matic</button>
            <button onclick="filterCategory('sport', this)" class="cat-btn px-7 py-2.5 bg-white text-slate-400 border border-slate-100 rounded-xl text-[11px] font-bold uppercase transition-all">Sport</button>
            <button onclick="filterCategory('cub', this)" class="cat-btn px-7 py-2.5 bg-white text-slate-400 border border-slate-100 rounded-xl text-[11px] font-bold uppercase transition-all">Cub</button>
        </div>
    </div>

    <main class="px-4">
        <div id="no-results" class="hidden py-24 text-center">
            <p class="text-slate-400 font-bold">Model tidak ditemukan...</p>
        </div>

        <div id="product-grid" class="grid grid-cols-2 gap-5">
            <a href="https://www.astra-honda.com/product/beat" target="_blank" class="product-card bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-100 block" data-type="matic" data-name="beat">
                <img src="https://via.placeholder.com/200x150?text=BeAT" alt="BeAT" class="w-full h-28 object-contain mb-4">
                <h3 class="text-xs font-extrabold text-slate-800 uppercase tracking-widest">Beat</h3>
                <p class="text-[9px] text-red-600 font-bold mt-2 uppercase tracking-tighter italic">Selengkapnya &rarr;</p>
            </a>
            <a href="https://www.astra-honda.com/product/vario-125" target="_blank" class="product-card bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-100 block" data-type="matic" data-name="vario 125">
                <img src="https://via.placeholder.com/200x150?text=Vario+125" alt="Vario 125" class="w-full h-28 object-contain mb-4">
                <h3 class="text-xs font-extrabold text-slate-800 uppercase tracking-widest">Vario 125</h3>
                <p class="text-[9px] text-red-600 font-bold mt-2 uppercase tracking-tighter italic">Selengkapnya &rarr;</p>
            </a>
            <a href="https://www.astra-honda.com/product/vario-160" target="_blank" class="product-card bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-100 block" data-type="matic" data-name="vario 160">
                <img src="https://via.placeholder.com/200x150?text=Vario+160" alt="Vario 160" class="w-full h-28 object-contain mb-4">
                <h3 class="text-xs font-extrabold text-slate-800 uppercase tracking-widest">Vario 160</h3>
                <p class="text-[9px] text-red-600 font-bold mt-2 uppercase tracking-tighter italic">Selengkapnya &rarr;</p>
            </a>
            <a href="https://www.astra-honda.com/product/stylo-160" target="_blank" class="product-card bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-100 block" data-type="matic" data-name="stylo 160">
                <img src="https://via.placeholder.com/200x150?text=Stylo+160" alt="Stylo 160" class="w-full h-28 object-contain mb-4">
                <h3 class="text-xs font-extrabold text-slate-800 uppercase tracking-widest">Stylo 160</h3>
                <p class="text-[9px] text-red-600 font-bold mt-2 uppercase tracking-tighter italic">Selengkapnya &rarr;</p>
            </a>
        </div>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] bg-white/90 backdrop-blur-xl rounded-[2.5rem] flex justify-around py-5 shadow-2xl z-50 border border-slate-100">
        <button class="text-red-600 flex flex-col items-center gap-1 active:scale-90 transition">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
            <span class="text-[8px] font-bold uppercase tracking-widest">Home</span>
        </button>
        <button class="text-slate-300 flex flex-col items-center gap-1 active:scale-90 transition">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" stroke-linecap="round" stroke-linejoin="round"></path></svg>
            <span class="text-[8px] font-bold uppercase tracking-widest">Produk</span>
        </button>
        
        <a href="https://maps.app.goo.gl/vJX61emznz2Xoaan8" target="_blank" class="text-slate-300 flex flex-col items-center gap-1 active:scale-90 transition">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" stroke-linecap="round" stroke-linejoin="round"></path><path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round"></path></svg>
            <span class="text-[8px] font-bold uppercase tracking-widest">Dealer</span>
        </a>
    </nav>

    <script>
        function toggleSearch() {
            const el = document.getElementById('search-container');
            if (el.style.maxHeight === '120px') {
                el.style.maxHeight = '0'; el.style.opacity = '0';
            } else {
                el.style.maxHeight = '120px'; el.style.opacity = '1';
                document.getElementById('search-input').focus();
            }
        }

        function searchProduct() {
            const query = document.getElementById('search-input').value.toLowerCase();
            document.querySelectorAll('.product-card').forEach(item => {
                const match = item.getAttribute('data-name').includes(query);
                item.style.display = match ? 'block' : 'none';
            });
        }

        function filterCategory(type, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => {
                b.className = 'cat-btn px-7 py-2.5 bg-white text-slate-400 border border-slate-100 rounded-xl text-[11px] font-bold uppercase transition-all';
            });
            btn.className = 'cat-btn px-7 py-2.5 bg-honda-red text-white rounded-xl text-[11px] font-bold uppercase transition-all shadow-lg shadow-red-100';

            document.querySelectorAll('.product-card').forEach(item => {
                const match = type === 'semua' || item.getAttribute('data-type') === type;
                item.style.display = match ? 'block' : 'none';
            });
        }
    </script>

</body>
</html>
