<!DOCTYPE html>

    <style>

        /* Style Slider */
        .slider-container { position: relative; overflow: hidden; width: 100%; height: 110px; border-radius: 1rem; }
        .slider-track { display: flex; transition: transform 0.5s ease-in-out; }
        .slide { min-width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .slide img { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>

        <div class="grid grid-cols-2 gap-5">

                            <img src="img/beat/variant-web-beat-sporty-black-deluxe-sk-copy-24072025-010919.webp" alt="BeAT Black">

        <button class="text-red-600 flex flex-col items-center gap-1"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg><span class="text-[8px] font-bold uppercase">Home</span></button>

    <script>
        // Logika Auto-Slider
        let currentSlide = 0;
        const track = document.getElementById('beat-slider');
        const slides = track.children.length;

        setInterval(() => {
            currentSlide = (currentSlide + 1) % slides;
            track.style.transform = `translateX(-${currentSlide * 100}%)`;
        }, 3000); // Ganti gambar setiap 3 detik
    </script>

</body>
</html>
