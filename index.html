<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Honda Future Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background: #f8fafc;
        }
        
        .honda-red { color: #ed1c24; }
        .bg-honda-red { background-color: #ed1c24; }
        
        /* Animasi Masuk (Fade In Up) */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up { animation: fadeInUp 0.6s ease-out forwards; }
        
        /* Delay Animasi untuk Grid */
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }

        /* Custom Cool Hyperlink Animation */
        .cool-link {
            position: relative;
            color: #ed1c24;
            font-weight: 700;
            text-decoration: none;
        }
        .cool-link::after {
            content: '';
            position: absolute;
            width: 100%;
            transform: scaleX(0);
            height: 2px;
            bottom: -2px;
            left: 0;
            background-color: #ed1c24;
            transform-origin: bottom right;
            transition: transform 0.4s cubic-bezier(0.86, 0, 0.07, 1);
        }
        .cool-link:hover::after {
            transform: scaleX(1);
            transform-origin: bottom left;
        }

        /* Sembunyikan scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="pb-28 text-slate-800">

    <header class="bg-white/80 backdrop-blur-md px-5 py-4 sticky top-0 z-50 shadow-sm flex justify-between items-center border-b border-white/20">
        <h1 class="text-2xl font-extrabold italic tracking-tighter honda-red">HONDA</h1>
        <div class="flex gap-4 items-center">
            <button class="w-10 h-10 bg-slate-100 flex items-center justify-center rounded-full active:scale-90 transition">
                <svg class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </button>
            <button class="w-10 h-10 bg-slate-100 flex items-center justify-center rounded-full active:scale-90 transition">
                <svg class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
            </button>
        </div>
    </header>

    <div class="p-4">
        <div class="w-full h-44 bg-gradient-to-br from-red-500 to-red-700 rounded-2xl mb-6 overflow-hidden relative shadow-lg shadow-red-200 animate-fade-up">

            <div class="absolute inset-0 flex flex-col justify-end p-5 text-white bg-gradient-to-t from-black/50 to-transparent">
                <span class="text-xs font-bold bg-white/20 backdrop-blur-sm w-fit px-3 py-1 rounded-full mb-2">PROMO MARET</span>
                <h2 class="text-xl font-bold">Dapatkan DP Ringan & Potongan Tenor!</h2>
                <a href="#" class="text-sm font-semibold underline mt-1 text-red-100 hover:text-white transition">Pelajari Syaratnya &rarr;</a>
            </div>
        </div>
    </div>

    <div class="bg-white/80 backdrop-blur-md border-b sticky top-[68px] z-40 mb-4 border-white/20">
        <div class="flex overflow-x-auto no-scrollbar py-3 px-4 gap-2 whitespace-nowrap">
            <button class="px-5 py-2.5 bg-honda-red text-white rounded-xl text-xs font-bold shadow-lg shadow-red-200 transition-all active:scale-95">SEMUA</button>
            <button class="px-5 py-2.5 bg-slate-100 text-slate-600 rounded-xl text-xs font-bold hover:bg-slate-200 transition-all active:scale-95">MATIK</button>
            <button class="px-5 py-2.5 bg-slate-100 text-slate-600 rounded-xl text-xs font-bold hover:bg-slate-200 transition-all active:scale-95">SPORT</button>
            <button class="px-5 py-2.5 bg-slate-100 text-slate-600 rounded-xl text-xs font-bold hover:bg-slate-200 transition-all active:scale-95">CUB</button>
            <button class="px-5 py-2.5 bg-slate-100 text-slate-600 rounded-xl text-xs font-bold hover:bg-slate-200 transition-all active:scale-95">EV</button>
        </div>
    </div>

    <main class="px-4">

        <div class="grid grid-cols-2 gap-4">

                </div>

                <p class="text-[10px] text-slate-400 mt-0.5">Mulai dari</p>
                <div class="flex justify-between items-center mt-0.5">
                    <p class="text-sm font-bold honda-red">Rp 27,3 Jt</p>
                    <a href="#" class="text-slate-400 hover:text-red-600 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>

            <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 opacity-0 animate-fade-up delay-2 hover:shadow-lg transition-all duration-300">
                <div class="relative h-28 flex items-center justify-center mb-3 group">
                    <img src="https://via.placeholder.com/200x150?text=Stylo" alt="Stylo" class="max-h-full transform group-hover:scale-110 transition duration-300">
                    <span class="absolute -top-1 -left-1 bg-gradient-to-r from-teal-500 to-emerald-500 text-white text-[9px] font-bold px-2 py-0.5 rounded-full shadow-md shadow-emerald-100">NEW</span>
                </div>
                <h3 class="text-sm font-bold text-slate-800 uppercase truncate">Stylo 160</h3>
                <p class="text-[10px] text-slate-400 mt-0.5">Mulai dari</p>
                <div class="flex justify-between items-center mt-0.5">
                    <p class="text-sm font-bold honda-red">Rp 28,1 Jt</p>
                    <a href="#" class="text-slate-400 hover:text-red-600 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </a>

            </div>

            <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 opacity-0 animate-fade-up delay-3 hover:shadow-lg transition-all duration-300">

                    <img src="https://via.placeholder.com/200x150?text=Beat" alt="Beat" class="max-h-full transform group-hover:scale-110 transition duration-300">
                </div>
                <h3 class="text-sm font-bold text-slate-800 uppercase truncate">BeAT Street</h3>
                <p class="text-[10px] text-slate-400 mt-0.5">Mulai dari</p>
                <div class="flex justify-between items-center mt-0.5">
                    <p class="text-sm font-bold honda-red">Rp 18,9 Jt</p>
                    <a href="#" class="text-slate-400 hover:text-red-600 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </a>
                </div>
            </div>

            <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 opacity-0 animate-fade-up delay-4 hover:shadow-lg transition-all duration-300">
                <div class="relative h-28 flex items-center justify-center mb-3 group">
                    <img src="https://via.placeholder.com/200x150?text=CBR" alt="CBR" class="max-h-full transform group-hover:scale-110 transition duration-300">
                </div>
                <h3 class="text-sm font-bold text-slate-800 uppercase truncate">CBR150R</h3>
                <p class="text-[10px] text-slate-400 mt-0.5">Mulai dari</p>
                <div class="flex justify-between items-center mt-0.5">
                    <p class="text-sm font-bold honda-red">Rp 37,8 Jt</p>
                    <a href="#" class="text-slate-400 hover:text-red-600 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </a>
                </div>
            </div>

        </div>
    </main>

    <div class="fixed bottom-5 left-1/2 transform -translate-x-1/2 w-[90%] bg-white/85 backdrop-blur-lg border border-white/40 rounded-3xl flex justify-around py-4 shadow-2xl z-50">
        <button class="flex flex-col items-center gap-1 text-red-600 scale-105 transition-all">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
            <span class="text-[10px] font-bold">Home</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600 transition">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>

        </button>
        <button class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600 transition">

        <button class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600 transition">

        </button>
    </div>

</body>
</html>
