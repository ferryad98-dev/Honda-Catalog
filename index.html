<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HAMBRA MOTOR HONDA - Katalog Lengkap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .honda-red { color: #ed1c24; }
        .bg-honda-red { background-color: #ed1c24; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="pb-32">

    <header class="glass px-5 py-5 sticky top-0 z-50 shadow-sm border-b border-slate-100">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-xl font-extrabold italic tracking-tighter honda-red leading-none uppercase">HAMBRA MOTOR</h1>
                <p class="text-[9px] font-bold text-slate-400 tracking-widest uppercase mt-1">Authorized Honda Dealer</p>
            </div>
            <button onclick="toggleSearch()" class="w-10 h-10 bg-slate-100 flex items-center justify-center rounded-2xl active:scale-90 transition">
                <svg class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2.5"></path></svg>
            </button>
        </div>
        <div id="search-container" class="max-h-0 opacity-0 overflow-hidden transition-all duration-300">
            <input type="text" id="search-input" onkeyup="searchProduct()" placeholder="Cari Vario, CBR, CRF..." 
                class="w-full bg-slate-100 border-none rounded-2xl py-4 px-6 text-sm mt-4 outline-none focus:ring-2 focus:ring-red-500">
        </div>
    </header>

    <div class="glass border-b sticky top-[82px] z-40">
        <div class="flex overflow-x-auto no-scrollbar py-4 px-4 gap-2 whitespace-nowrap">
            <button onclick="filterCategory('semua', this)" class="cat-btn px-6 py-2.5 bg-honda-red text-white rounded-xl text-[11px] font-bold uppercase transition-all">Semua</button>
            <button onclick="filterCategory('matic', this)" class="cat-btn px-6 py-2.5 bg-white text-slate-500 border border-slate-100 rounded-xl text-[11px] font-bold uppercase transition-all">Matic</button>
            <button onclick="filterCategory('sport', this)" class="cat-btn px-6 py-2.5 bg-white text-slate-500 border border-slate-100 rounded-xl text-[11px] font-bold uppercase transition-all">Sport</button>
            <button onclick="filterCategory('cub', this)" class="cat-btn px-6 py-2.5 bg-white text-slate-500 border border-slate-100 rounded-xl text-[11px] font-bold uppercase transition-all">Cub</button>
            <button onclick="filterCategory('ev', this)" class="cat-btn px-6 py-2.5 bg-white text-slate-500 border border-slate-100 rounded-xl text-[11px] font-bold uppercase transition-all">EV</button>
        </div>
    </div>

    <main class="p-4">
        <div id="product-grid" class="grid grid-cols-2 gap-4">
            
            <div class="product-card bg-white rounded-3xl p-4 shadow-sm border border-slate-50" data-type="matic" data-name="beat">
                <img src="https://via.placeholder.com/200x150?text=BeAT" class="w-full h-24 object-contain mb-3">
                <h3 class="text-xs font-bold text-slate-800 uppercase">BeAT</h3>
                <p class="text-[10px] text-red-600 font-bold mt-1 uppercase">Matic</p>
            </div>
            <div class="product-card bg-white rounded-3xl p-4 shadow-sm border border-slate-50" data-type="matic" data-name="vario 125">
                <img src="https://via.placeholder.com/200x150?text=Vario+125" class="w-full h-24 object-contain mb-3">
                <h3 class="text-xs font-bold text-slate-800 uppercase">Vario 125</h3>
                <p class="text-[10px] text-red-600 font-bold mt-1 uppercase">Matic</p>
            </div>
            <div class="product-card bg-white rounded-3xl p-4 shadow-sm border border-slate-50" data-type="matic" data-name="vario 160">
                <img src="https://via.placeholder.com/200x150?text=Vario+160" class="w-full h-24 object-contain mb-3">
                <h3 class="text-xs font-bold text-slate-800 uppercase">Vario 160</h3>
                <p class="text-[10px] text-red-600 font-bold mt-1 uppercase">Matic</p>
            </div>
            <div class="product-card bg-white rounded-3xl p-4 shadow-sm border border-slate-50" data-type="matic" data-name="stylo 160">
                <img src="https://via.placeholder.com/200x150?text=Stylo+160" class="w-full h-24 object-contain mb-3">
                <h3 class="text-xs font-bold text-slate-800 uppercase">Stylo 160</h3>
                <p class="text-[10px] text-red-600 font-bold mt-1 uppercase">Matic</p>
            </div>
            <div class="product-card bg-white rounded-3xl p-4 shadow-sm border border-slate-50" data-type="matic" data-name="scoopy">
                <img src="https://via.placeholder.com/200x150?text=Scoopy" class="w-full h-24 object-contain mb-3">
                <h3 class="text-xs font-bold text-slate-800 uppercase">Scoopy</h3>
                <p class="text-[10px] text-red-600 font-bold mt-1 uppercase">Matic</p>
            </div>
            <div class="product-card bg-white rounded-3xl p-4 shadow-sm border border-slate-50" data-type="matic" data-name="pcx 160">
                <img src="https://via.placeholder.com/200x150?text=PCX+160" class="w-full h-24 object-contain mb-3">
                <h3 class="text-xs font-bold text-slate-800 uppercase">PCX 160</h3>
                <p class="text-[10px] text-red-600 font-bold mt-1 uppercase">Matic</p>
            </div>
            <div class="product-card bg-white rounded-3xl p-4 shadow-sm border border-slate-50" data-type="matic" data-name="adv 160">
                <img src="https://via.placeholder.com/200x150?text=ADV+160" class="w-full h-24 object-contain mb-3">
                <h3 class="text-xs font-bold text-slate-800 uppercase">ADV 160</h3>
                <p class="text-[10px] text-red-600 font-bold mt-1 uppercase">Matic</p>
            </div>

            <div class="product-card bg-white rounded-3xl p-4 shadow-sm border border-slate-50" data-type="sport" data-name="cbr150r">
                <img src="https://via.placeholder.com/200x150?text=CBR150R" class="w-full h-24 object-contain mb-3">
                <h3 class="text-xs font-bold text-slate-800 uppercase">CBR150R</h3>
                <p class="text-[10px] text-red-600 font-bold mt-1 uppercase">Sport</p>
            </div>
            <div class="product-card bg-white rounded-3xl p-4 shadow-sm border border-slate-50" data-type="sport" data-name="cbr250rr">
                <img src="https://via.placeholder.com/200x150?text=CBR250RR" class="w-full h-24 object-contain mb-3">
                <h3 class="text-xs font-bold text-slate-800 uppercase">CBR250RR</h3>
                <p class="text-[10px] text-red-600 font-bold mt-1 uppercase">Sport</p>
            </div>
            <div class="product-card bg-white rounded-3xl p-4 shadow-sm border border-slate-50" data-type="sport" data-name="crf150l">
                <img src="https://via.placeholder.com/200x150?text=CRF150L" class="w-full h-24 object-contain mb-3">
                <h3 class="text-xs font-bold text-slate-800 uppercase">CRF150L</h3>
                <p class="text-[10px] text-red-600 font-bold mt-1 uppercase">Sport</p>
            </div>
            <div class="product-card bg-white rounded-3xl p-4 shadow-sm border border-slate-50" data-type="sport" data-name="cb150r">
                <img src="https://via.placeholder.com/200x150?text=CB150R" class="w-full h-24 object-contain mb-3">
                <h3 class="text-xs font-bold text-slate-800 uppercase">CB150R Streetfire</h3>
                <p class="text-[10px] text-red-600 font-bold mt-1 uppercase">Sport</p>
            </div>

            <div class="product-card bg-white rounded-3xl p-4 shadow-sm border border-slate-50" data-type="cub" data-name="supra x 125">
                <img src="https://via.placeholder.com/200x150?text=Supra+X" class="w-full h-24 object-contain mb-3">
                <h3 class="text-xs font-bold text-slate-800 uppercase">Supra X 125</h3>
                <p class="text-[10px] text-red-600 font-bold mt-1 uppercase">Cub</p>
            </div>
            <div class="product-card bg-white rounded-3xl p-4 shadow-sm border border-slate-50" data-type="cub" data-name="revo">
                <img src="https://via.placeholder.com/200x150?text=Revo" class="w-full h-24 object-contain mb-3">
                <h3 class="text-xs font-bold text-slate-800 uppercase">Revo</h3>
                <p class="text-[10px] text-red-600 font-bold mt-1 uppercase">Cub</p>
            </div>

            <div class="product-card bg-white rounded-3xl p-4 shadow-sm border border-slate-50" data-type="ev" data-name="em1 e">
                <img src="https://via.placeholder.com/200x150?text=EM1+e" class="w-full h-24 object-contain mb-3">
                <h3 class="text-xs font-bold text-slate-800 uppercase">Honda EM1 e:</h3>
                <p class="text-[10px] text-red-600 font-bold mt-1 uppercase">Electric Vehicle</p>
            </div>

        </div>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] glass rounded-[2rem] flex justify-around py-4 shadow-2xl z-50 border border-white/20">
        <button class="honda-red"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg></button>
        <button class="text-slate-300"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" stroke-width="2"></path></svg></button>
        <button class="text-slate-300"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" stroke-width="2"></path></svg></button>
    </nav>

    <script>
        function toggleSearch() {
            const el = document.getElementById('search-container');
            if (el.style.maxHeight === '100px') {
                el.style.maxHeight = '0'; el.style.opacity = '0';
            } else {
                el.style.maxHeight = '100px'; el.style.opacity = '1';
                document.getElementById('search-input').focus();
            }
        }

        function searchProduct() {
            const query = document.getElementById('search-input').value.toLowerCase();
            document.querySelectorAll('.product-card').forEach(item => {
                const match = item.getAttribute('data-name').includes(query);
                item.style.display = match ? 'block' : 'none';
            });
        }

        function filterCategory(type, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => {
                b.classList.replace('bg-honda-red', 'bg-white');
                b.classList.replace('text-white', 'text-slate-500');
            });
            btn.classList.replace('bg-white', 'bg-honda-red');
            btn.classList.replace('text-slate-500', 'text-white');

            document.querySelectorAll('.product-card').forEach(item => {
                const match = type === 'semua' || item.getAttribute('data-type') === type;
                item.style.display = match ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
