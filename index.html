<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HAMBRA HONDA MALANG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfdfd; -webkit-tap-highlight-color: transparent; }
        .honda-red { color: #ed1c24; }
        .bg-honda-red { background-color: #ed1c24; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .hero-banner {
            background: linear-gradient(135deg, #ed1c24 0%, #8b1115 100%);
            border-radius: 2.5rem;
            position: relative;
            overflow: hidden;
        }

        .slider-wrapper { position: relative; width: 100%; height: 110px; }
        .manual-slider { 
            display: flex; overflow-x: auto; scroll-snap-type: x mandatory; 
            scroll-behavior: smooth; height: 100%;
        }
        .manual-slide { min-width: 100%; scroll-snap-align: center; display: flex; justify-content: center; }

        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.9); border-radius: 50%; width: 24px; height: 24px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 10; border: 1px solid #eee;
        }

        #zoom-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; justify-content: center; align-items: center; z-index: 100;
        }
        #zoom-modal.active { display: flex; }
    </style>
</head>
<body class="pb-32">

    <header class="bg-white px-5 py-4 sticky top-0 z-50 border-b border-slate-50 flex flex-col gap-3">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="logo.jpg" class="w-10 h-10 object-contain rounded-lg">
                <div>
                    <h1 class="text-xl font-extrabold leading-none honda-red uppercase">HAMBRA HONDA MALANG</h1>
                    <p class="text-[8px] font-bold text-slate-400 tracking-widest uppercase mt-0.5">Authorized Honda Dealer</p>
                </div>
            </div>
            <button onclick="toggleSearch()" class="w-10 h-10 bg-slate-50 rounded-2xl flex items-center justify-center active:scale-90 transition">
                <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2.5"></path></svg>
            </button>
        </div>

        <div id="search-bar" class="hidden w-full pb-2">
            <input type="text" id="searchInput" onkeyup="searchProduct()" placeholder="Cari tipe motor..." 
            class="w-full bg-slate-100 border-none rounded-2xl px-4 py-3 text-xs font-semibold focus:ring-2 focus:ring-red-500 outline-none">
        </div>
    </header>

     <section class="px-4 mt-4">
        <div class="hero-banner p-8 text-white shadow-xl shadow-red-200">
            <span class="bg-black/20 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider">Official Store</span>
            <h2 class="text-2xl font-extrabold leading-tight mt-3">Selamat Datang di<br>HAMBRA HONDA MALANG</h2>
            <p class="text-[11px] text-white/80 mt-2">Solusi motor Honda terbaik untuk Anda.</p>
        </div>

        <div class="mt-8 flex flex-col items-center">
            <h2 class="text-sm font-extrabold text-slate-800 uppercase tracking-[0.2em] mb-4">PROMO</h2>
            <div class="w-full rounded-[2rem] overflow-hidden shadow-lg border border-slate-50">
                <img src="promo1.jpg" alt="Promo Honda" class="w-full h-auto object-cover">
            </div>
        </div>
    </section>

    <div class="px-4 mt-10">
        <p class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-3">Pilih Motor Favorit Anda</p>
        <div class="flex gap-3 overflow-x-auto no-scrollbar">
            <button class="bg-honda-red text-white px-6 py-2.5 rounded-2xl text-[10px] font-bold uppercase shadow-lg shadow-red-200">Semua</button>
            <button class="bg-white border border-slate-100 text-slate-400 px-6 py-2.5 rounded-2xl text-[10px] font-bold uppercase">Matic</button>
            <button class="bg-white border border-slate-100 text-slate-400 px-6 py-2.5 rounded-2xl text-[10px] font-bold uppercase">Sport</button>
        </div>
    </div>

    <main class="px-4 mt-8">
        <div id="productGrid" class="grid grid-cols-2 gap-5">
            
            <div class="product-card bg-white rounded-[2.5rem] p-5 shadow-sm border border-slate-50 flex flex-col justify-between" data-name="beat sporty street deluxe">
                <div class="slider-wrapper">
                    <button onclick="sideScroll('beat-s', 'l')" class="nav-btn -left-2">
                        <svg class="w-3 h-3 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="3"></path></svg>
                    </button>
                    <button onclick="sideScroll('beat-s', 'r')" class="nav-btn -right-2">
                        <svg class="w-3 h-3 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="3"></path></svg>
                    </button>
                    <div id="beat-s" class="manual-slider no-scrollbar">
                         <div class="manual-slide"><img src="img/beat/variant-web-beat-sporty-black-deluxe-sk-copy-24072025-010919.webp" onclick="openZ(this)" class="h-full object-contain cursor-zoom-in"></div>
                         <div class="manual-slide"><img src="img/beat/variant-web-beat-sporty-blue-deluxe-sk-copy-24072025-010915.webp" onclick="openZ(this)" class="h-full object-contain cursor-zoom-in"></div>
                         <div class="manual-slide"><img src="img/beat/variant-web-beat-sporty-brown-deluxe-sk-copy-24072025-010911.webp" onclick="openZ(this)" class="h-full object-contain cursor-zoom-in"></div>
                         <div class="manual-slide"><img src="img/beat/variant-web-beat-sporty-deluxe-matte-green-copy-24072025-010933.webp" onclick="openZ(this)" class="h-full object-contain cursor-zoom-in"></div>
                         <div class="manual-slide"><img src="img/beat/variant-web-beat-sporty-deluxe-metallic-black-copy-24072025-010926.webp" onclick="openZ(this)" class="h-full object-contain cursor-zoom-in"></div>
                         <div class="manual-slide"><img src="img/beat/variant-web-beat-sporty-funk-red-black-cbs-copy-24072025-010938.webp" onclick="openZ(this)" class="h-full object-contain cursor-zoom-in"></div>
                         <div class="manual-slide"><img src="img/beat/variant-web-beat-sporty-hard-black-cbs-copy-24072025-010945.webp" onclick="openZ(this)" class="h-full object-contain cursor-zoom-in"></div>
                         <div class="manual-slide"><img src="img/beat/variant-web-beat-sporty-jazz-white-black-cbs-copy-24072025-010950.webp" onclick="openZ(this)" class="h-full object-contain cursor-zoom-in"></div>
                    </div>
                </div>
                
                <h3 class="text-[10px] font-extrabold text-slate-800 uppercase tracking-widest mt-6 text-center">Beat Series</h3>
                <a href="beat.html" class="text-[9px] honda-red font-extrabold mt-3 uppercase italic block text-center border border-red-100 py-2 rounded-xl active:bg-red-50">LIHAT VARIAN</a>
            </div>

            <div class="product-card bg-white rounded-[2.5rem] p-5 shadow-sm border border-slate-50 flex flex-col items-center justify-center opacity-40" data-name="vario 125 160">
                <div class="h-24 w-full bg-slate-50 rounded-3xl mb-4"></div>
                <h3 class="text-[10px] font-extrabold text-slate-800 uppercase tracking-widest text-center">Vario 125</h3>
                <p class="text-[8px] text-slate-400 font-bold mt-2 uppercase italic text-center">Segera Hadir</p>
            </div>

        </div>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] bg-white rounded-[2.5rem] py-5 px-10 shadow-2xl flex justify-between items-center border border-slate-50 z-50">
        <div class="flex flex-col items-center gap-1 active:scale-90 transition">
            <svg class="w-6 h-6 text-red-600" fill="currentColor" viewBox="0 0 24 24"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
            <span class="text-[8px] font-bold text-red-600 uppercase">HOME</span>
        </div>
        
        <a href="https://wa.me/6281945348703" class="flex flex-col items-center gap-1 text-slate-300 active:scale-90 transition">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
            <span class="text-[8px] font-bold uppercase">CHAT</span>
        </a>

        <a href="https://maps.app.goo.gl/mrTzT7X15fAwh4ts5" class="flex flex-col items-center gap-1 text-slate-300 active:scale-90 transition">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path></svg>
            <span class="text-[8px] font-bold uppercase">LOKASI</span>
        </a>
    </nav>

    <div id="zoom-modal" onclick="this.classList.remove('active')">
        <img id="z-img" class="max-w-[90%] max-h-[85%] object-contain shadow-2xl">
    </div>

    <script>
        // Fitur Toggle Search Bar
        function toggleSearch() {
            const bar = document.getElementById('search-bar');
            bar.classList.toggle('hidden');
            if (!bar.classList.contains('hidden')) {
                document.getElementById('searchInput').focus();
            }
        }

        // Fitur Pencarian Produk
        function searchProduct() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('product-card');

            for (let i = 0; i < cards.length; i++) {
                let name = cards[i].getAttribute('data-name');
                if (name.includes(input)) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }

        function sideScroll(id, dir) {
            const el = document.getElementById(id);
            const scrollStep = el.clientWidth;
            const maxScrollLeft = el.scrollWidth - el.clientWidth;
            if (dir === 'r') {
                if (el.scrollLeft >= maxScrollLeft - 5) { el.scrollTo({ left: 0, behavior: 'smooth' }); }
                else { el.scrollBy({ left: scrollStep, behavior: 'smooth' }); }
            } else {
                if (el.scrollLeft <= 5) { el.scrollTo({ left: maxScrollLeft, behavior: 'smooth' }); }
                else { el.scrollBy({ left: -scrollStep, behavior: 'smooth' }); }
            }
        }

        function openZ(img) {
            document.getElementById('z-img').src = img.src;
            document.getElementById('zoom-modal').classList.add('active');
        }
    </script>
</body>
</html>
