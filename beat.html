    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfdfd; -webkit-tap-highlight-color: transparent; }
        .honda-red { color: #ed1c24; }
        .bg-honda-red { background-color: #ed1c24; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .hero-banner-beat {
            background: linear-gradient(135deg, #ed1c24 0%, #333 100%);
            border-radius: 2.5rem;
            position: relative;
            overflow: hidden;
        }

        /* Banner Slider Style */
        .banner-container { position: relative; width: 100%; overflow: hidden; border-radius: 1.5rem; }
        .banner-wrapper { display: flex; transition: transform 0.5s ease-in-out; }
        .banner-slide { min-width: 100%; }

        /* Tombol Navigasi Slider */
        .nav-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(4px);
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            z-index: 10; shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            transition: all 0.2s;
        }
        .nav-arrow:active { scale: 0.9; background: white; }

        .slider-wrapper { position: relative; width: 100%; height: 120px; }
        .manual-slider { 
            display: flex; overflow-x: auto; scroll-snap-type: x mandatory; 
            scroll-behavior: smooth; height: 100%;
        }
        .manual-slide { min-width: 100%; scroll-snap-align: center; display: flex; justify-content: center; }

        #zoom-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; justify-content: center; align-items: center; z-index: 100;
        }
        #zoom-modal.active { display: flex; }
    </style>
</head>

    <div id="zoom-modal" onclick="this.classList.remove('active')">
        <img id="z-img" class="max-w-[90%] max-h-[85%] object-contain">
    </div>

    <script>
        let currentSlide = 0;
        const bannerWrapper = document.getElementById('autoBanner');
        const totalSlides = 3;
        let slideInterval;

        function updateSlider() {
            bannerWrapper.style.transform = `translateX(-${currentSlide * 100}%)`;
        }

        function nextSlide() {
            currentSlide = (currentSlide + 1) % totalSlides;
            updateSlider();
            resetTimer();
        }

        function prevSlide() {
            currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
            updateSlider();
            resetTimer();
        }

        function resetTimer() {
            clearInterval(slideInterval);
            slideInterval = setInterval(nextSlide, 3000);
        }

        // Jalankan timer pertama kali
        slideInterval = setInterval(nextSlide, 3000);

        function openZ(img) {
            document.getElementById('z-img').src = img.src;
            document.getElementById('zoom-modal').classList.add('active');
        }

        // Fungsi untuk navigasi manual pada slider varian (BEAT ALL VARIANTS)
function sideScroll(elementId, direction) {
    const container = document.getElementById(elementId);
    const scrollAmount = container.clientWidth; // Geser sejauh lebar kontainer
    const maxScroll = container.scrollWidth - container.clientWidth;

    if (direction === 'r') {
        // Jika sudah di ujung kanan (atau mendekati), balik ke awal (Loop)
        if (container.scrollLeft >= maxScroll - 5) {
            container.scrollTo({ left: 0, behavior: 'smooth' });
        } else {
            container.scrollBy({ left: scrollAmount, behavior: 'smooth' });
        }
    } else {
        // Jika sudah di ujung kiri, balik ke paling akhir (Loop)
        if (container.scrollLeft <= 5) {
            container.scrollTo({ left: maxScroll, behavior: 'smooth' });
        } else {
            container.scrollBy({ left: -scrollAmount, behavior: 'smooth' });
        }
    }
}
    </script>
